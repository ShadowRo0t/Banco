apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: default
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'Banco Dashboards'
        orgId: 1
        folder: 'Banco'
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  namespace: default
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          volumeMounts:
            - name: grafana-datasources-vol
              mountPath: /etc/grafana/provisioning/datasources/
            - name: grafana-dashboards-provider-vol
              mountPath: /etc/grafana/provisioning/dashboards/
            - name: grafana-custom-dashboard-vol
              mountPath: /var/lib/grafana/dashboards/
      volumes:
        - name: grafana-datasources-vol
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-provider-vol
          configMap:
            name: grafana-dashboards-provider
        - name: grafana-custom-dashboard-vol
          configMap:
            name: grafana-dashboard-json
