apiVersion: apps/v1
kind: Deployment
metadata:
  name: banco-api-deployment
  namespace: default
  labels:
    app: banco-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banco-api
  template:
    metadata:
      labels:
        app: banco-api
      annotations:
        # Permite que Prometheus extraiga métricas de este pod automáticamente
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: banco-api:latest  # La imagen construida en el pipeline CI/CD
          imagePullPolicy: IfNotPresent  # Facilita la carga de imágenes en Minikube/Kind
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: banco-api-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
